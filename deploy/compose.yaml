# ContextOS team-mode self-host stack — Module 04a S7.
#
# Operator-facing entrypoint for self-hosted deployments. Run from the
# repo root after copying `deploy/.env.example` to `deploy/.env` and
# filling in DATABASE_URL + LOCAL_HOOK_SECRET:
#
#     docker compose -f deploy/compose.yaml up -d
#
# Boot order (Compose dependency chain):
#   1. postgres        — pgvector image; healthchecked
#   2. cloud-migrate   — one-shot; runs `contextos cloud-migrate`
#   3. mcp-server      — depends on cloud-migrate completing
#   4. hooks-bridge    — depends on cloud-migrate completing
#   5. sync-daemon     — depends on cloud-migrate completing

name: contextos

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contextos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contextos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-contextos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - contextos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contextos} -d ${POSTGRES_DB:-contextos}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=vector"

  cloud-migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.cloud-migrate
    image: contextos/cloud-migrate:dev
    container_name: contextos-cloud-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"

  mcp-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp-server
    image: contextos/mcp-server:dev
    container_name: contextos-mcp-server
    depends_on:
      cloud-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      CONTEXTOS_MODE: team
      CONTEXTOS_HOME: /home/node/.contextos
      DATABASE_URL: ${DATABASE_URL}
      LOCAL_HOOK_SECRET: ${LOCAL_HOOK_SECRET}
    ports:
      - "${MCP_SERVER_PORT:-3100}:3100"
    volumes:
      - contextos_home:/home/node/.contextos

  hooks-bridge:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.hooks-bridge
    image: contextos/hooks-bridge:dev
    container_name: contextos-hooks-bridge
    depends_on:
      cloud-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      CONTEXTOS_MODE: team
      CONTEXTOS_HOME: /home/node/.contextos
      DATABASE_URL: ${DATABASE_URL}
      LOCAL_HOOK_SECRET: ${LOCAL_HOOK_SECRET}
    ports:
      - "${HOOKS_BRIDGE_PORT:-3101}:3101"
    volumes:
      - contextos_home:/home/node/.contextos

  sync-daemon:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.sync-daemon
    image: contextos/sync-daemon:dev
    container_name: contextos-sync-daemon
    depends_on:
      cloud-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      CONTEXTOS_MODE: team
      CONTEXTOS_HOME: /home/node/.contextos
      DATABASE_URL: ${DATABASE_URL}
      CONTEXTOS_SYNC_TICK_MS: ${CONTEXTOS_SYNC_TICK_MS:-1000}
      CONTEXTOS_SYNC_LEASE_MS: ${CONTEXTOS_SYNC_LEASE_MS:-30000}
    volumes:
      - contextos_home:/home/node/.contextos

volumes:
  contextos_pg_data:
    name: contextos_pg_data
  contextos_home:
    name: contextos_home_compose
